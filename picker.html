<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Tools — Class Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --panel: #0a1520;
    --panel2: #0d1e2e;
    --accent: #00e5ff;
    --accent2: #39ff14;
    --accent3: #ff6b35;
    --warn: #ffcc00;
    --purple: #b06aff;
    --text: #c8e6f0;
    --dim: #4a7a8a;
    --glow: 0 0 20px rgba(0,229,255,0.4);
    --glow2: 0 0 20px rgba(57,255,20,0.4);
    --border: 1px solid rgba(0,229,255,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg);
    font-family: 'Exo 2', sans-serif;
    color: var(--text);
    width: 100vw; 
    /* Fix: Use dynamic viewport height and allow scrolling for mobile/Smart Boards */
    min-height: 100vh;
    min-height: 100dvh; 
    overflow-x: hidden;
    overflow-y: auto; 
    display: flex; 
    flex-direction: column;
  }
  
  canvas.bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 28px;
    background: linear-gradient(90deg, rgba(0,229,255,0.06), transparent, rgba(176,106,255,0.04));
    border-bottom: 1px solid rgba(0,229,255,0.15);
    flex-shrink: 0; /* Fix: Prevent header from shrinking */
  }
  
  .lab-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem; font-weight: 900; letter-spacing: 0.2em;
    color: var(--accent);
    text-shadow: var(--glow);
    display: flex; align-items: center; gap: 10px;
  }
  
  .clock-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.6rem; color: var(--accent2);
    text-shadow: var(--glow2); letter-spacing: 0.1em;
  }
  
  nav { display: flex; gap: 10px; }
  nav a {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem; letter-spacing: 0.15em;
    padding: 6px 16px;
    border: 1px solid rgba(0,229,255,0.3);
    color: var(--dim); text-decoration: none;
    border-radius: 3px; transition: all 0.2s;
    background: rgba(0,229,255,0.04);
  }
  nav a.active, nav a:hover {
    color: var(--accent); border-color: var(--accent);
    background: rgba(0,229,255,0.1); box-shadow: var(--glow);
  }

  main {
    position: relative; z-index: 10;
    flex: 1; 
    display: grid;
    grid-template-columns: 260px 1fr 280px;
    gap: 14px; 
    padding: 14px;
    min-height: 0;
  }

  /* Handle small/vertical screens (Tablets/Smart Boards in portrait) */
  @media (max-width: 1024px) {
    main {
      grid-template-columns: 1fr;
      overflow-y: visible;
    }
    body { overflow-y: auto; }
  }

  .panel {
    background: linear-gradient(135deg, var(--panel), var(--panel2));
    border: var(--border);
    border-radius: 8px;
    padding: 14px;
    position: relative; 
    overflow: hidden;
    display: flex; 
    flex-direction: column;
    min-height: 300px; /* Ensure panels have a base presence */
  }
  
  .panel::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  
  .panel-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.58rem; letter-spacing: 0.25em;
    color: var(--dim); text-transform: uppercase;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  
  .panel-label::before {
    content: ''; display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--purple);
    box-shadow: 0 0 8px var(--purple);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── CLASS MANAGER ── */
  #class-panel { grid-column: 1; }
  @media (max-width: 1024px) { #class-panel { grid-column: auto; order: 2; } }

  .class-tabs { display: flex; gap: 4px; margin-bottom: 10px; flex-shrink: 0; flex-wrap: wrap; }
  .class-tab {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem; padding: 4px 10px;
    border-radius: 3px; cursor: pointer;
    border: 1px solid rgba(0,229,255,0.2);
    color: var(--dim); background: rgba(0,0,0,0.3);
    transition: all 0.15s; touch-action: manipulation;
  }
  .class-tab.active {
    color: var(--accent); border-color: var(--accent);
    background: rgba(0,229,255,0.1); box-shadow: var(--glow);
  }

  .add-class-row, .student-add-row { display: flex; gap: 6px; margin-bottom: 10px; flex-shrink: 0; }
  .class-name-input, .student-input {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem; color: var(--text);
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 3px; padding: 5px 8px; flex: 1;
  }
  .icon-btn, .add-s-btn {
    font-family: 'Orbitron', monospace;
    cursor: pointer; transition: all 0.15s; touch-action: manipulation;
  }

  .student-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; min-height: 100px; }
  .student-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 8px; background: rgba(0,0,0,0.3);
    border: 1px solid rgba(176,106,255,0.15); border-radius: 4px; font-size: 0.82rem;
  }

  /* ── WHEEL CENTER ── */
  #wheel-panel {
    grid-column: 2;
    align-items: center; justify-content: center; gap: 10px;
  }
  @media (max-width: 1024px) { #wheel-panel { grid-column: auto; order: 1; min-height: 500px; } }

  .wheel-wrapper {
    position: relative;
    flex: 1; 
    display: flex; align-items: center; justify-content: center;
    min-height: 250px; /* Fix: Ensure wheel has space to exist */
    width: 100%;
  }
  
  #wheelCanvas {
    max-width: 100%; max-height: 100%;
    border-radius: 50%;
    filter: drop-shadow(0 0 18px rgba(0,229,255,0.25));
  }
  
  .wheel-pointer {
    position: absolute; top: -4px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 28px solid var(--accent3);
    z-index: 5;
  }

  .spin-controls { 
    display: flex; 
    flex-direction: column; /* Stack on mobile to save width */
    gap: 12px; 
    align-items: center; 
    flex-shrink: 0; /* Fix: Stop the button area from disappearing */
    padding: 10px 0;
  }

  .spin-btn {
    font-family: 'Orbitron', monospace;
    font-size: 1rem; font-weight: 700; letter-spacing: 0.15em;
    padding: 14px 40px;
    background: linear-gradient(135deg, rgba(57,255,20,0.12), rgba(0,229,255,0.08));
    border: 2px solid var(--accent2); /* Thicker border for visibility */
    color: var(--accent2); border-radius: 6px; cursor: pointer;
    box-shadow: var(--glow2);
    touch-action: manipulation;
  }
  
  .spin-btn:active { transform: scale(0.95); }

  /* ── TEAMS PANEL ── */
  #teams-panel { grid-column: 3; }
  @media (max-width: 1024px) { #teams-panel { grid-column: auto; order: 3; } }

  .teams-output { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; min-height: 150px; }

  #result-flash {
    position: absolute; bottom: 10px; left: 10px; right: 10px;
    background: rgba(10, 21, 32, 0.95);
    border: 1px solid var(--accent); border-radius: 8px;
    padding: 14px; text-align: center; display: none; z-index: 20;
  }
  #result-flash.show { display: block; }
</style>
</head>
<body>

<canvas class="bg-canvas" id="bgCanvas"></canvas>

<header>
  <div class="lab-title">
    <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
      <path d="M10 4v10l-6 10h20L18 14V4" stroke="#00e5ff" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="12" cy="19" r="1.5" fill="#39ff14"/>
    </svg>
    LAB CONTROL
  </div>
  <div class="clock-display" id="liveClock">00:00:00</div>
  <nav>
    <a href="#" class="active">⬡ CLASS TOOLS</a>
  </nav>
</header>

<main>
  <div class="panel" id="class-panel">
    <div class="panel-label">CLASS ROSTER</div>
    <div class="class-tabs" id="classTabs"></div>
    <div class="add-class-row">
      <input class="class-name-input" id="classNameInput" type="text" placeholder="New class..." maxlength="20">
      <button class="icon-btn" onclick="addClass()">+ CLASS</button>
    </div>
    <div class="student-add-row">
      <input class="student-input" id="studentInput" type="text" placeholder="Add student..." maxlength="40">
      <button class="add-s-btn" onclick="addStudent()">+</button>
    </div>
    <div class="student-list" id="studentList"></div>
    <div class="class-stats" id="classStats">
      <span id="statsText"></span>
      <button class="restore-btn" onclick="restoreRemoved()" id="restoreBtn" style="display:none; color:var(--accent); background:none; border:none; cursor:pointer;">RESTORE</button>
    </div>
  </div>

  <div class="panel" id="wheel-panel">
    <div class="panel-label">WHEEL OF DOOM</div>
    <div class="wheel-wrapper">
      <div class="wheel-pointer"></div>
      <canvas id="wheelCanvas" width="380" height="380"></canvas>
      <div id="result-flash">
        <div style="font-size:0.7rem; color:var(--dim)">SELECTED</div>
        <div class="result-name" id="resultName" style="font-size:1.5rem; color:var(--accent2); font-family:Orbitron; font-weight:900;">—</div>
      </div>
    </div>
    <div class="spin-controls">
      <button class="spin-btn" id="spinBtn" onclick="spinWheel()">⚡ SPIN WHEEL</button>
      <label style="font-size:0.7rem; color:var(--dim); display:flex; gap:8px; align-items:center;">
        <input type="checkbox" id="removeAfterSpin" checked> Remove after spin
      </label>
    </div>
  </div>

  <div class="panel" id="teams-panel">
    <div class="panel-label">COMPOUND TEAMS</div>
    <div style="display:flex; gap:8px; margin-bottom:10px;">
      <input class="size-input" type="number" id="teamSize" value="3" style="width:50px; background:#000; color:#fff; border:1px solid var(--accent2); text-align:center;">
      <button class="gen-btn" onclick="generateTeams()" style="flex:1; background:rgba(57,255,20,0.1); color:var(--accent2); border:1px solid var(--accent2); cursor:pointer;">GENERATE</button>
    </div>
    <div class="teams-output" id="teamsOutput"></div>
  </div>
</main>

<script>
// (All your original logic remains here, ensuring storage and wheel drawing works)
const STORAGE_KEY = 'lab_classes_v2';
let appData = loadData();
let wheelAngle = 0;
let spinning = false;

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {classes:{},active:''}; }
  catch { return {classes:{},active:''}; }
}
function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }

// Clock
setInterval(() => {
  const n = new Date();
  document.getElementById('liveClock').textContent = n.toTimeString().split(' ')[0];
}, 1000);

// Basic Actions
function getActive() { return appData.classes[appData.active] || null; }

function addClass() {
  const inp = document.getElementById('classNameInput');
  if (!inp.value.trim()) return;
  appData.classes[inp.value.trim()] = { students: [] };
  appData.active = inp.value.trim();
  inp.value = ''; saveData(); renderAll();
}

function addStudent() {
  const inp = document.getElementById('studentInput');
  const c = getActive();
  if (!c || !inp.value.trim()) return;
  c.students.push({ name: inp.value.trim(), removed: false, id: Date.now() });
  inp.value = ''; saveData(); renderAll();
}

function removeStudent(id) {
  const c = getActive();
  const s = c.students.find(x=>x.id===id);
  if(s) { s.removed = !s.removed; saveData(); renderAll(); }
}

function restoreRemoved() {
  const c = getActive();
  if(c) { c.students.forEach(s=>s.removed=false); saveData(); renderAll(); }
}

// Rendering
function renderAll() {
  const c = getActive();
  const t = document.getElementById('classTabs');
  t.innerHTML = '';
  Object.keys(appData.classes).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'class-tab' + (name === appData.active ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => { appData.active = name; saveData(); renderAll(); };
    t.appendChild(btn);
  });

  const list = document.getElementById('studentList');
  list.innerHTML = '';
  if (c) {
    c.students.forEach(s => {
      const div = document.createElement('div');
      div.className = 'student-item' + (s.removed ? ' removed' : '');
      div.style.opacity = s.removed ? '0.4' : '1';
      div.innerHTML = `<span style="flex:1">${s.name}</span><button onclick="removeStudent(${s.id})" style="background:none; border:none; color:var(--dim); cursor:pointer;">${s.removed?'↩':'⊘'}</button>`;
      list.appendChild(div);
    });
    const remCount = c.students.filter(s=>s.removed).length;
    document.getElementById('restoreBtn').style.display = remCount > 0 ? 'inline' : 'none';
  }
  drawWheel();
}

// Wheel Logic
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const WHEEL_COLORS = [['#00e5ff','#007a8a'],['#39ff14','#1a7a00'],['#b06aff','#5c2a8a'],['#ff6b35','#8a3200']];

function drawWheel() {
  const c = getActive();
  const students = c ? c.students.filter(s => !s.removed) : [];
  const cx = canvas.width/2, cy = canvas.height/2, r = cx - 10;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (students.length === 0) {
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle = 'rgba(0,229,255,0.2)'; ctx.stroke();
    return;
  }

  const arc = (Math.PI*2)/students.length;
  students.forEach((s, i) => {
    const angle = wheelAngle + i * arc;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,angle,angle+arc);
    ctx.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length][0];
    ctx.fill(); ctx.stroke();
    
    ctx.save();
    ctx.translate(cx + Math.cos(angle+arc/2)*(r*0.7), cy + Math.sin(angle+arc/2)*(r*0.7));
    ctx.rotate(angle+arc/2 + Math.PI/2);
    ctx.fillStyle = "#000"; ctx.fillText(s.name.slice(0,8), 0,0);
    ctx.restore();
  });
}

function spinWheel() {
  if (spinning) return;
  spinning = true;
  const start = performance.now();
  const duration = 4000;
  const extraSpin = Math.PI * 10 + Math.random() * 10;
  const initialAngle = wheelAngle;

  function animate(now) {
    const t = Math.min((now - start)/duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    wheelAngle = initialAngle + extraSpin * ease;
    drawWheel();
    if (t < 1) requestAnimationFrame(animate);
    else {
      spinning = false;
      const c = getActive();
      const students = c.students.filter(s => !s.removed);
      // Simplified winner logic for demo
      const winnerIdx = Math.floor(Math.random() * students.length);
      const winner = students[winnerIdx];
      if (winner) {
        document.getElementById('resultName').textContent = winner.name;
        document.getElementById('result-flash').classList.add('show');
        if (document.getElementById('removeAfterSpin').checked) {
            winner.removed = true; saveData(); setTimeout(renderAll, 2000);
        }
        setTimeout(() => document.getElementById('result-flash').classList.remove('show'), 3000);
      }
    }
  }
  requestAnimationFrame(animate);
}

function generateTeams() {
    const c = getActive();
    if (!c) return;
    const students = [...c.students.filter(s => !s.removed)].sort(() => Math.random() - 0.5);
    const size = document.getElementById('teamSize').value;
    const out = document.getElementById('teamsOutput');
    out.innerHTML = '';
    for (let i = 0; i < students.length; i += parseInt(size)) {
        const team = students.slice(i, i + parseInt(size));
        const div = document.createElement('div');
        div.style.padding = '10px'; div.style.border = '1px solid var(--accent2)';
        div.innerHTML = `<strong>TEAM ${Math.floor(i/size)+1}</strong>: ` + team.map(s => s.name).join(', ');
        out.appendChild(div);
    }
}

// Handle resizing
function resize() {
    const parent = canvas.parentElement;
    const s = Math.min(parent.clientWidth, parent.clientHeight, 400);
    canvas.width = s; canvas.height = s;
    drawWheel();
}
window.addEventListener('resize', resize);
resize();
renderAll();
</script>
</body>
</html>
