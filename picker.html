<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Tools — Class Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --panel: #0a1520;
    --panel2: #0d1e2e;
    --accent: #00e5ff;
    --accent2: #39ff14;
    --accent3: #ff6b35;
    --warn: #ffcc00;
    --purple: #b06aff;
    --text: #c8e6f0;
    --dim: #4a7a8a;
    --glow: 0 0 20px rgba(0,229,255,0.4);
    --glow2: 0 0 20px rgba(57,255,20,0.4);
    --border: 1px solid rgba(0,229,255,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  /* FIXED: Changed to min-height and added overflow-y: auto for mobile accessibility */
  body {
    background: var(--bg);
    font-family: 'Exo 2', sans-serif;
    color: var(--text);
    width: 100vw; 
    min-height: 100vh;
    min-height: 100dvh; /* Dynamic viewport height for mobile Chrome */
    overflow-x: hidden;
    overflow-y: auto; 
    display: flex; flex-direction: column;
  }
  
  canvas.bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 28px;
    background: linear-gradient(90deg, rgba(0,229,255,0.06), transparent, rgba(176,106,255,0.04));
    border-bottom: 1px solid rgba(0,229,255,0.15);
    flex-shrink: 0;
  }
  .lab-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem; font-weight: 900; letter-spacing: 0.2em;
    color: var(--accent);
    text-shadow: var(--glow);
    display: flex; align-items: center; gap: 10px;
  }
  .clock-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.6rem; color: var(--accent2);
    text-shadow: var(--glow2); letter-spacing: 0.1em;
  }
  nav { display: flex; gap: 10px; }
  nav a {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem; letter-spacing: 0.15em;
    padding: 6px 16px;
    border: 1px solid rgba(0,229,255,0.3);
    color: var(--dim); text-decoration: none;
    border-radius: 3px; transition: all 0.2s;
    background: rgba(0,229,255,0.04);
  }
  nav a.active, nav a:hover {
    color: var(--accent); border-color: var(--accent);
    background: rgba(0,229,255,0.1); box-shadow: var(--glow);
  }

  main {
    position: relative; z-index: 10;
    flex: 1; display: grid;
    grid-template-columns: 260px 1fr 280px;
    gap: 14px; padding: 14px;
    min-height: 0;
  }

  /* Responsive adjustment for Smart Boards/Tablets */
  @media (max-width: 1024px) {
    main {
      grid-template-columns: 1fr;
      overflow-y: visible;
    }
    #class-panel, #wheel-panel, #teams-panel { grid-column: 1; min-height: 500px; }
  }

  .panel {
    background: linear-gradient(135deg, var(--panel), var(--panel2));
    border: var(--border);
    border-radius: 8px;
    padding: 14px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .panel::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .panel-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.58rem; letter-spacing: 0.25em;
    color: var(--dim); text-transform: uppercase;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }

  /* ── CLASS MANAGER ── */
  #class-panel { grid-column: 1; }
  .class-tabs { display: flex; gap: 4px; margin-bottom: 10px; flex-shrink: 0; flex-wrap: wrap; }
  .class-tab {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem; padding: 4px 10px;
    border-radius: 3px; cursor: pointer;
    border: 1px solid rgba(0,229,255,0.2);
    color: var(--dim); background: rgba(0,0,0,0.3);
    transition: all 0.15s;
  }
  .class-tab.active { color: var(--accent); border-color: var(--accent); background: rgba(0,229,255,0.1); box-shadow: var(--glow); }

  .student-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; min-height: 100px; }
  .student-item { display: flex; align-items: center; gap: 8px; padding: 5px 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(176,106,255,0.15); border-radius: 4px; font-size: 0.82rem; }

  /* ── WHEEL CENTER ── */
  #wheel-panel {
    grid-column: 2;
    align-items: center; justify-content: center; gap: 10px;
  }

  /* FIXED: Added min-height to ensure wrapper doesn't collapse */
  .wheel-wrapper {
    position: relative;
    flex: 1; 
    display: flex; align-items: center; justify-content: center;
    min-height: 300px; 
    width: 100%;
  }
  #wheelCanvas {
    max-width: 100%; max-height: 100%;
    border-radius: 50%;
    filter: drop-shadow(0 0 18px rgba(0,229,255,0.25));
  }
  .wheel-pointer {
    position: absolute; top: -4px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 28px solid var(--accent3);
    z-index: 5;
  }

  /* FIXED: Ensured controls never shrink to 0 height */
  .spin-controls { 
    display: flex; 
    flex-direction: column;
    gap: 12px; 
    align-items: center; 
    flex-shrink: 0; 
    padding: 10px 0;
    width: 100%;
  }

  .spin-btn {
    font-family: 'Orbitron', monospace;
    font-size: 1rem; font-weight: 700; letter-spacing: 0.15em;
    padding: 14px 48px;
    background: linear-gradient(135deg, rgba(57,255,20,0.12), rgba(0,229,255,0.08));
    border: 1px solid var(--accent2);
    color: var(--accent2); border-radius: 6px; cursor: pointer;
    box-shadow: var(--glow2);
  }

  /* Result flash */
  #result-flash {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(135deg, rgba(0,229,255,0.12), rgba(57,255,20,0.08));
    border: 1px solid var(--accent); border-radius: 8px; padding: 14px 20px;
    text-align: center; display: none; z-index: 20;
  }
  #result-flash.show { display: block; }

  /* ── TEAMS ── */
  #teams-panel { grid-column: 3; }
  .teams-output { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; min-height: 100px; }
</style>
</head>
<body>

<canvas class="bg-canvas" id="bgCanvas"></canvas>

<header>
  <div class="lab-title">LAB CONTROL</div>
  <div class="clock-display" id="liveClock">00:00:00</div>
  <nav>
    <a href="#">⬡ MAIN LAB</a>
    <a href="#" class="active">⬡ CLASS TOOLS</a>
  </nav>
</header>

<main>
  <div class="panel" id="class-panel">
    <div class="panel-label">CLASS ROSTER</div>
    <div class="class-tabs" id="classTabs"></div>
    <div style="display:flex; gap:6px; margin-bottom:10px;">
        <input class="student-input" id="studentInput" style="background:rgba(0,0,0,0.4); border:1px solid var(--accent); color:white; padding:5px; flex:1;" type="text" placeholder="Add student..." onkeydown="if(event.key==='Enter')addStudent()">
        <button class="icon-btn" style="background:var(--accent); color:black; border:none; padding:5px 10px; cursor:pointer;" onclick="addStudent()">+</button>
    </div>
    <div class="student-list" id="studentList"></div>
    <div class="class-stats" id="classStats">
        <span id="statsText"></span>
        <button class="restore-btn" onclick="restoreRemoved()" id="restoreBtn" style="display:none; background:none; border:none; color:var(--accent); cursor:pointer; font-size:0.7rem;">RESTORE ALL</button>
    </div>
  </div>

  <div class="panel" id="wheel-panel">
    <div class="panel-label">WHEEL OF DOOM</div>
    <div class="wheel-wrapper">
      <div class="wheel-pointer"></div>
      <canvas id="wheelCanvas" width="380" height="380"></canvas>
      <div id="result-flash">
        <div class="result-name" id="resultName" style="font-family:Orbitron; font-size:1.5rem; color:var(--accent2);">—</div>
      </div>
    </div>
    <div class="spin-controls">
      <button class="spin-btn" id="spinBtn" onclick="spinWheel()">⚡ SPIN</button>
      <label style="font-size:0.7rem; color:var(--dim); display:flex; gap:5px; align-items:center;">
        <input type="checkbox" id="removeAfterSpin" checked> Remove after spin
      </label>
    </div>
  </div>

  <div class="panel" id="teams-panel">
    <div class="panel-label">COMPOUND TEAMS</div>
    <div style="display:flex; gap:8px; margin-bottom:10px; align-items:center;">
        <input type="number" id="teamSize" value="3" style="width:40px; background:black; color:white; border:1px solid var(--accent2);">
        <button onclick="generateTeams()" style="background:var(--accent2); color:black; border:none; padding:5px; cursor:pointer; font-size:0.7rem;">GENERATE</button>
    </div>
    <div class="teams-output" id="teamsOutput"></div>
  </div>
</main>

<script>
// Data Management
const STORAGE_KEY = 'lab_classes_v2';
let appData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {classes:{'Default':{students:[]}},active:'Default'};

function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }
function getActive() { return appData.classes[appData.active]; }
function activeStudents() { return getActive().students.filter(s => !s.removed); }

// Clock
setInterval(() => {
    const n = new Date();
    document.getElementById('liveClock').textContent = n.toTimeString().split(' ')[0];
}, 1000);

// Wheel Logic
const wheelCanvas = document.getElementById('wheelCanvas');
const wctx = wheelCanvas.getContext('2d');
let wheelAngle = 0;

const COLORS = ['#00e5ff','#39ff14','#b06aff','#ff6b35','#ffcc00'];

function drawWheel() {
    const students = activeStudents();
    const cx = wheelCanvas.width/2, cy = wheelCanvas.height/2, r = cx - 10;
    wctx.clearRect(0,0,wheelCanvas.width,wheelCanvas.height);
    
    if(students.length === 0) {
        wctx.strokeStyle = '#444'; wctx.strokeRect(0,0,wheelCanvas.width,wheelCanvas.height);
        return;
    }

    const arc = (Math.PI * 2) / students.length;
    students.forEach((s, i) => {
        wctx.beginPath();
        wctx.moveTo(cx, cy);
        wctx.arc(cx, cy, r, wheelAngle + i*arc, wheelAngle + (i+1)*arc);
        wctx.fillStyle = COLORS[i % COLORS.length] + '44';
        wctx.fill();
        wctx.strokeStyle = COLORS[i % COLORS.length];
        wctx.stroke();
        
        wctx.save();
        wctx.translate(cx, cy);
        wctx.rotate(wheelAngle + i*arc + arc/2);
        wctx.fillStyle = "white";
        wctx.font = "bold 12px Arial";
        wctx.fillText(s.name.substring(0,10), r/2, 5);
        wctx.restore();
    });
}

function spinWheel() {
    if(activeStudents().length < 2) return;
    const btn = document.getElementById('spinBtn');
    btn.disabled = true;
    
    let speed = 0.4 + Math.random() * 0.2;
    const friction = 0.98;
    
    function animate() {
        wheelAngle += speed;
        speed *= friction;
        drawWheel();
        if(speed > 0.002) requestAnimationFrame(animate);
        else {
            btn.disabled = false;
            finalizeSpin();
        }
    }
    animate();
}

function finalizeSpin() {
    const students = activeStudents();
    const arc = (Math.PI * 2) / students.length;
    let angle = (1.5 * Math.PI - wheelAngle) % (Math.PI * 2);
    if(angle < 0) angle += Math.PI * 2;
    const idx = Math.floor(angle / arc) % students.length;
    const winner = students[idx];
    
    document.getElementById('resultName').textContent = winner.name;
    document.getElementById('result-flash').classList.add('show');
    
    if(document.getElementById('removeAfterSpin').checked) {
        winner.removed = true;
        saveData();
        renderStudents();
    }
    setTimeout(() => document.getElementById('result-flash').classList.remove('show'), 3000);
}

// UI Rendering
function renderStudents() {
    const list = document.getElementById('studentList');
    list.innerHTML = '';
    getActive().students.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'student-item' + (s.removed ? ' removed' : '');
        div.style.opacity = s.removed ? '0.3' : '1';
        div.innerHTML = `<span>${s.name}</span><button onclick="deleteStudent(${i})" style="margin-left:auto; background:none; border:none; color:red; cursor:pointer;">✕</button>`;
        list.appendChild(div);
    });
    drawWheel();
}

function addStudent() {
    const name = document.getElementById('studentInput').value;
    if(!name) return;
    getActive().students.push({name, removed: false});
    document.getElementById('studentInput').value = '';
    saveData(); renderStudents();
}

function deleteStudent(i) {
    getActive().students.splice(i, 1);
    saveData(); renderStudents();
}

function restoreRemoved() {
    getActive().students.forEach(s => s.removed = false);
    saveData(); renderStudents();
}

function generateTeams() {
    const students = [...activeStudents()].sort(() => Math.random() - 0.5);
    const size = parseInt(document.getElementById('teamSize').value);
    const output = document.getElementById('teamsOutput');
    output.innerHTML = '';
    
    for (let i = 0; i < students.length; i += size) {
        const team = students.slice(i, i + size);
        const div = document.createElement('div');
        div.style.borderLeft = "3px solid " + COLORS[i % COLORS.length];
        div.style.padding = "5px";
        div.style.marginBottom = "5px";
        div.style.background = "rgba(255,255,255,0.05)";
        div.innerHTML = `<strong>TEAM ${Math.floor(i/size)+1}</strong>: ` + team.map(s => s.name).join(', ');
        output.appendChild(div);
    }
}

// Init
window.addEventListener('resize', () => {
    const size = Math.min(document.querySelector('.wheel-wrapper').clientWidth, 380);
    wheelCanvas.width = size;
    wheelCanvas.height = size;
    drawWheel();
});
renderStudents();
</script>
</body>
</html>
